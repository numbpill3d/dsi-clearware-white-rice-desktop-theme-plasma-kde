<?xml version="1.0" encoding="UTF-8"?>
<!-- DSi icon: multimedia — purple tile, music note glyph -->
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
 <defs>
  <linearGradient id="tile" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
   <stop offset="0"   stop-color="#9060d8"/>
   <stop offset="1"   stop-color="#5828a8"/>
  </linearGradient>
  <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="24" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#ffffff" stop-opacity="0.40"/>
   <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
 </defs>
 <rect x="1" y="1" width="46" height="46" rx="10" ry="10" fill="url(#tile)"/>
 <rect x="1" y="1" width="46" height="23" rx="10" ry="10" fill="url(#gloss)"/>
 <!-- music note stem -->
 <line x1="28" y1="14" x2="28" y2="30" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
 <!-- music note flag -->
 <path d="M 28,14 Q 36,16 34,22" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
 <!-- note head -->
 <ellipse cx="24.5" cy="30.5" rx="4.5" ry="3.2" transform="rotate(-15 24.5 30.5)" fill="#ffffff" opacity="0.9"/>
</svg>
