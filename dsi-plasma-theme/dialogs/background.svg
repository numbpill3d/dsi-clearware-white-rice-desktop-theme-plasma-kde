<?xml version="1.0" encoding="UTF-8"?>
<!-- DSi dialog background — same as widget bg, slightly larger radius -->
<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
 <defs>
  <linearGradient id="gd" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#f6f6fa"/>
   <stop offset="1" stop-color="#ebebf2"/>
  </linearGradient>
  <linearGradient id="gdt" x1="0" y1="0"  x2="0"   y2="12"  gradientUnits="userSpaceOnUse">
   <stop offset="0"    stop-color="#b8b8cc"/>
   <stop offset="0.3"  stop-color="#d4d4e4"/>
   <stop offset="1"    stop-color="#f6f6fa"/>
  </linearGradient>
  <linearGradient id="gdb" x1="0" y1="88" x2="0"   y2="100" gradientUnits="userSpaceOnUse">
   <stop offset="0"    stop-color="#ebebf2"/>
   <stop offset="0.7"  stop-color="#d4d4e4"/>
   <stop offset="1"    stop-color="#b8b8cc"/>
  </linearGradient>
  <linearGradient id="gdl" x1="0" y1="0"  x2="12"  y2="0"   gradientUnits="userSpaceOnUse">
   <stop offset="0"    stop-color="#b8b8cc"/>
   <stop offset="0.3"  stop-color="#d4d4e4"/>
   <stop offset="1"    stop-color="#f6f6fa"/>
  </linearGradient>
  <linearGradient id="gdr" x1="88" y1="0" x2="100" y2="0"   gradientUnits="userSpaceOnUse">
   <stop offset="0"    stop-color="#ebebf2"/>
   <stop offset="0.7"  stop-color="#d4d4e4"/>
   <stop offset="1"    stop-color="#b8b8cc"/>
  </linearGradient>
 </defs>

 <rect id="hint-top-margin"    x="0" y="0" width="1"  height="10" fill="none"/>
 <rect id="hint-bottom-margin" x="0" y="0" width="1"  height="10" fill="none"/>
 <rect id="hint-left-margin"   x="0" y="0" width="10" height="1"  fill="none"/>
 <rect id="hint-right-margin"  x="0" y="0" width="10" height="1"  fill="none"/>

 <path id="topleft"     d="M 12,0 L 12,12 L 0,12 A 12,12 0 0 1 12,0 Z"         fill="#f6f6fa"/>
 <path id="topright"    d="M 88,0 L 88,12 L 100,12 A 12,12 0 0 0 88,0 Z"       fill="#f6f6fa"/>
 <path id="bottomleft"  d="M 0,88 L 12,88 L 12,100 A 12,12 0 0 1 0,88 Z"       fill="#ebebf2"/>
 <path id="bottomright" d="M 100,88 L 88,88 L 88,100 A 12,12 0 0 0 100,88 Z"   fill="#ebebf2"/>

 <rect id="top"    x="12" y="0"  width="76" height="12" fill="url(#gdt)"/>
 <rect id="bottom" x="12" y="88" width="76" height="12" fill="url(#gdb)"/>
 <rect id="left"   x="0"  y="12" width="12" height="76" fill="url(#gdl)"/>
 <rect id="right"  x="88" y="12" width="12" height="76" fill="url(#gdr)"/>
 <rect id="center" x="12" y="12" width="76" height="76" fill="url(#gd)"/>
</svg>
