<?xml version="1.0" encoding="UTF-8"?>
<!-- DSi plasma panel — light grey plastic, blue top accent, glossy -->
<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
 <defs>
  <linearGradient id="gp" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
   <stop offset="0"   stop-color="#f6f6fa"/>
   <stop offset="0.5" stop-color="#eaeaef"/>
   <stop offset="1"   stop-color="#e0e0e8"/>
  </linearGradient>
  <linearGradient id="gg" x1="0" y1="0" x2="0" y2="50" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#ffffff" stop-opacity="0.38"/>
   <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
 </defs>

 <!-- margin hints: content inset 4px from each edge -->
 <rect id="hint-top-margin"    x="0" y="0" width="1" height="4" fill="none"/>
 <rect id="hint-bottom-margin" x="0" y="0" width="1" height="4" fill="none"/>
 <rect id="hint-left-margin"   x="0" y="0" width="4" height="1" fill="none"/>
 <rect id="hint-right-margin"  x="0" y="0" width="4" height="1" fill="none"/>

 <!-- corners -->
 <g id="topleft">
  <path d="M 8,0 L 8,8 L 0,8 A 8,8 0 0 1 8,0 Z" fill="url(#gp)"/>
  <path d="M 8,0 L 8,8 L 0,8 A 8,8 0 0 1 8,0 Z" fill="url(#gg)"/>
 </g>
 <g id="topright">
  <path d="M 92,0 L 92,8 L 100,8 A 8,8 0 0 0 92,0 Z" fill="url(#gp)"/>
  <path d="M 92,0 L 92,8 L 100,8 A 8,8 0 0 0 92,0 Z" fill="url(#gg)"/>
 </g>
 <path id="bottomleft"  d="M 0,92 L 8,92 L 8,100 A 8,8 0 0 1 0,92 Z"           fill="url(#gp)"/>
 <path id="bottomright" d="M 100,92 L 92,92 L 92,100 A 8,8 0 0 0 100,92 Z"      fill="url(#gp)"/>

 <!-- top edge: blue DSi accent line + gloss -->
 <g id="top">
  <rect x="8" y="0" width="84" height="8" fill="url(#gp)"/>
  <rect x="8" y="0" width="84" height="8" fill="url(#gg)"/>
  <rect x="8" y="0" width="84" height="1.5" fill="#7ab4f0" opacity="0.85"/>
 </g>

 <rect id="bottom" x="8"  y="92" width="84" height="8"  fill="url(#gp)"/>
 <rect id="left"   x="0"  y="8"  width="8"  height="84" fill="url(#gp)"/>
 <rect id="right"  x="92" y="8"  width="8"  height="84" fill="url(#gp)"/>

 <!-- center: gradient + gloss on upper half -->
 <g id="center">
  <rect x="8" y="8" width="84" height="84" fill="url(#gp)"/>
  <rect x="8" y="8" width="84" height="42" fill="url(#gg)"/>
 </g>
</svg>
