<?xml version="1.0" encoding="UTF-8"?>
<!-- DSi icon: system settings — slate grey tile, gear glyph -->
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
 <defs>
  <linearGradient id="tile" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
   <stop offset="0"   stop-color="#8080a0"/>
   <stop offset="1"   stop-color="#505068"/>
  </linearGradient>
  <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="24" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#ffffff" stop-opacity="0.38"/>
   <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
 </defs>
 <rect x="1" y="1" width="46" height="46" rx="10" ry="10" fill="url(#tile)"/>
 <rect x="1" y="1" width="46" height="23" rx="10" ry="10" fill="url(#gloss)"/>
 <!-- gear ring -->
 <circle cx="24" cy="24" r="7" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
 <!-- gear center hole -->
 <circle cx="24" cy="24" r="3" fill="url(#tile)"/>
 <!-- gear teeth (8 teeth) -->
 <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9">
  <line x1="24" y1="13" x2="24" y2="10"/>
  <line x1="24" y1="35" x2="24" y2="38"/>
  <line x1="13" y1="24" x2="10" y2="24"/>
  <line x1="35" y1="24" x2="38" y2="24"/>
  <line x1="16.5" y1="16.5" x2="14.4" y2="14.4"/>
  <line x1="31.5" y1="31.5" x2="33.6" y2="33.6"/>
  <line x1="31.5" y1="16.5" x2="33.6" y2="14.4"/>
  <line x1="16.5" y1="31.5" x2="14.4" y2="33.6"/>
 </g>
</svg>
