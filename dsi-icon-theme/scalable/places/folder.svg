<?xml version="1.0" encoding="UTF-8"?>
<!-- DSi icon: folder — blue rounded square tile -->
<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
 <defs>
  <linearGradient id="tile" x1="0" y1="0" x2="0" y2="48" gradientUnits="userSpaceOnUse">
   <stop offset="0"   stop-color="#5aa8f0"/>
   <stop offset="1"   stop-color="#2868c0"/>
  </linearGradient>
  <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="24" gradientUnits="userSpaceOnUse">
   <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
   <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>
 </defs>
 <!-- rounded square tile -->
 <rect x="1" y="1" width="46" height="46" rx="10" ry="10" fill="url(#tile)"/>
 <rect x="1" y="1" width="46" height="23" rx="10" ry="10" fill="url(#gloss)"/>
 <!-- folder tab -->
 <path d="M 11,18 L 11,15 Q 11,14 12,14 L 19,14 Q 21,14 22,15.5 L 23,17 Q 24,18 26,18 Z"
       fill="#ffffff" opacity="0.9"/>
 <!-- folder body -->
 <rect x="11" y="18" width="26" height="16" rx="2" ry="2" fill="#ffffff" opacity="0.9"/>
</svg>
